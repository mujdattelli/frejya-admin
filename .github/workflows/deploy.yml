name: Deploy to GitHub Pages

# main'e her push'ta Vite projesini derler ve GitHub Pages'e yayinlar.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Pages'i workflow icinden otomatik etkinlestir (manuel ayar gerekmez)
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      # npm ci yerine npm install — package-lock.json Windows'ta uretildi,
      # CI Linux; npm install platforma ozgu (rollup) ikilileri dogru cozer.
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
